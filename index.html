<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b5cff" />
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="icons/icon-512.png">
  <link rel="icon" href="icons/related-icon.svg">
  <link rel="stylesheet" href="style.css">
  <title>3D Print Calculator</title>
</head>
<body>
  <main>
    <div class="toggle-switch">
      <input id="themeToggle" type="checkbox" role="switch" aria-checked="false">
      <label for="themeToggle" aria-hidden="true"><span class="switch-knob"></span></label>
    </div>
    <h1>3D Print Cost</h1>

    <form id="calcForm" class="stacked">
      <div class="field">
        <label for="design">Design Time (hrs)</label>
        <input id="design" name="design" type="number" step="0.01" min="0" placeholder="e.g. 1.5">
        <button id="clear-design" class="clear-field" type="button" aria-label="Clear design">×</button>
      </div>

      <div class="field">
        <label for="mass">Mass (g)</label>
        <input id="mass" name="mass" type="number" step="0.01" min="0" placeholder="e.g. 25">
        <button id="clear-mass" class="clear-field" type="button" aria-label="Clear mass">×</button>
      </div>

      <div class="field">
        <label for="printHours">Print Time — Hours</label>
        <input id="printHours" name="printHours" type="number" step="0.01" min="0" placeholder="e.g. 3 or 3.5">
        <button id="clear-printHours" class="clear-field" type="button" aria-label="Clear print hours">×</button>
      </div>

      <div class="field">
        <label for="printMinutes">Print Time — Minutes (optional)</label>
        <input id="printMinutes" name="printMinutes" type="number" step="1" min="0" max="59" placeholder="e.g. 15">
        <button id="clear-printMinutes" class="clear-field" type="button" aria-label="Clear print minutes">×</button>
      </div>
    </form>

    <button id="clear" class="clear-btn" type="button" aria-label="Clear all inputs">Clear All</button>

    <div id="result" aria-live="polite">$—</div>
  </main>

  <script src="app.js"></script>
</body>
</html>
