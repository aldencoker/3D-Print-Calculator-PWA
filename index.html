<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <meta name="theme-color" content="#0b5cff" />
  <link rel="manifest" href="manifest.json">
  <link rel="icon" href="icons/icon-192.png" sizes="192x192">
  <link rel="apple-touch-icon" href="icons/icon-512.png">
  <link rel="icon" href="icons/related-icon.svg">
  <link rel="stylesheet" href="style.css">
  <title>3D Print Calculator</title>
</head>
<body>
  <main>
    <button id="themeToggle" class="theme-toggle" aria-label="Toggle dark mode">🌙</button>
    <h1>3D Print Cost</h1>

    <form id="calcForm" class="compact">
      <input id="design" name="design" type="number" step="0.01" min="0" placeholder="Design hrs">
      <input id="mass" name="mass" type="number" step="0.01" min="0" placeholder="Mass g">
      <input id="printtime" name="printtime" type="number" step="0.01" min="0" placeholder="Print hrs">
    </form>

    <button id="clear" class="clear-btn" type="button" aria-label="Clear inputs">Clear</button>

    <div id="result" aria-live="polite">$—</div>
  </main>

  <script src="app.js"></script>
</body>
</html>
